apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-only-from-backend
spec:
  podSelector:
    matchLabels:
      app: todo-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: todo-backend
      ports:
        - protocol: TCP
          port: 5432
